name: Deploy Admin to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4

      - name: Checkout proofdesign
        uses: actions/checkout@v4
        with:
          repository: ma-stevenson/proofdesign
          path: proofdesign
          token: ${{ secrets.GH_PAT }}
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proofdesign/package-lock.json

      - name: Build Expo web app
        working-directory: proofdesign
        run: |
          npm ci
          npx expo export --platform web
        continue-on-error: true

      - name: Build site
        run: |
          mkdir -p _site
          cp -r $(ls -A | grep -v _site | grep -v proofdesign) _site/ 2>/dev/null || true
          mkdir -p _site/screenshots
          cp -r proofdesign/screenshots/. _site/screenshots/ 2>/dev/null || true
          if [ -d proofdesign/dist ]; then
            mkdir -p _site/app
            cp -r proofdesign/dist/. _site/app/
          fi

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
