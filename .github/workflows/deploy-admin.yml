name: Deploy Admin to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4

      - name: Checkout proofdesign for screenshots
        uses: actions/checkout@v4
        with:
          repository: ma-stevenson/proofdesign
          path: proofdesign
          token: ${{ secrets.GH_PAT }}
        continue-on-error: true

      - name: Build site
        run: |
          mkdir -p _site
          cp -r $(ls -A | grep -v _site | grep -v proofdesign) _site/ 2>/dev/null || true
          mkdir -p _site/screenshots
          cp -r proofdesign/screenshots/. _site/screenshots/ 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
