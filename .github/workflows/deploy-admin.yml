name: Deploy Admin to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout admin repo
        uses: actions/checkout@v4

      - name: Checkout proofdesign for screenshots
        uses: actions/checkout@v4
        with:
          repository: ma-stevenson/proofdesign
          path: proofdesign
          token: ${{ secrets.GH_PAT }}

      - name: Build site
        run: |
          mkdir -p _site
          cp -r . _site/
          rm -rf _site/.git _site/.github _site/proofdesign
          mkdir -p _site/screenshots
          cp -r proofdesign/screenshots/. _site/screenshots/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
