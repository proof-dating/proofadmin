<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proof Admin · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #C94F7C, #3C0D0E);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #2D070D;
      text-align: center;
    }
    .logo span { color: #B3304B; }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1E1E1E;
      text-align: center;
      margin-top: -8px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 14px; font-weight: 500; color: #5E1B27; }
    input {
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: #2D070D;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #B3304B; }
    .error {
      font-size: 14px;
      color: #DC2626;
      text-align: center;
      min-height: 20px;
    }
    button {
      background: #2C2C2C;
      color: #F5F5F5;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">proof <span>admin</span></div>
    <h1>Sign in</h1>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="error" id="error"></div>
    <button id="btn" onclick="handleLogin()">Sign in</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL  = "https://ltnmcufyscpryaqzpfyw.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bm1jdWZ5c2NwcnlhcXpwZnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNDgyMzYsImV4cCI6MjA4NzgyNDIzNn0.Ltq6_MENN18EzX5KpoUKRhyg6S8Jd5CJ4laNioYw82Q";
    const ALLOWED_EMAIL = "chainandrocket@gmail.com";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // If already logged in as the allowed user, go straight to admin
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user?.email === ALLOWED_EMAIL) {
        window.location.href = "index.html";
      }
    });

    async function handleLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl  = document.getElementById("error");
      const btn      = document.getElementById("btn");

      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Signing in…";

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message || "Sign in failed.";
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }

      if (data?.user?.email !== ALLOWED_EMAIL) {
        await sb.auth.signOut();
        errorEl.textContent = "Access denied.";
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }

      window.location.href = "index.html";
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
