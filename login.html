<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proof Admin · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #C94F7C, #3C0D0E);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.04em; color: #2D070D; text-align: center; }
    .logo span { color: #B3304B; }
    h1 { font-size: 20px; font-weight: 600; color: #1E1E1E; text-align: center; margin-top: -8px; }
    p { font-size: 14px; color: #757575; text-align: center; margin-top: -8px; }
    .error { font-size: 14px; color: #DC2626; text-align: center; min-height: 20px; }
    button {
      background: #24292e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s;
      width: 100%;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">proof <span>admin</span></div>
    <h1>Sign in</h1>
    <p>Access is restricted to proof-dating org members.</p>
    <div class="error" id="error"></div>
    <button id="btn" onclick="handleGitHub()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      Sign in with GitHub
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const ADMIN_URL  = "https://lygrudsxpngsjlurjspc.supabase.co";
    const ADMIN_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5Z3J1ZHN4cG5nc2psdXJqc3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODc4MjEsImV4cCI6MjA5NzQ2MzgyMX0.JI3Mr6hzw9lVB2QHXZ4QLWAqqAmgTSiFsAXJumqHrSo";
    const ORG = "proof-dating";

    const sb = supabase.createClient(ADMIN_URL, ADMIN_ANON);

    // Show error from redirect if present
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "access_denied") {
      document.getElementById("error").textContent = "Your GitHub account is not a member of the proof-dating org.";
    }

    // If already logged in, go straight to admin
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "index.html";
    });

    async function handleGitHub() {
      const btn = document.getElementById("btn");
      btn.disabled = true;
      btn.innerHTML = "Redirecting…";
      await sb.auth.signInWithOAuth({
        provider: "github",
        options: {
          scopes: "read:org",
          redirectTo: window.location.origin + "/index.html",
        },
      });
    }
  </script>
</body>
</html>
